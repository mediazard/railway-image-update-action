name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2
        with:
          generate_release_notes: true

      - name: Re-point rolling major tag
        # Re-points v0 → current commit for tags like v0.X.Y
        # Re-points v1 → current commit for tags like v1.X.Y
        # Consumers can pin to @v0 or @v1 for a stable but auto-updating reference.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"   # e.g. "v0" from "v0.2.1"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "${MAJOR}" "${GITHUB_SHA}"
          git push origin "refs/tags/${MAJOR}:refs/tags/${MAJOR}" --force
