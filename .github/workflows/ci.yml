name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Verify Node version matches .node-version
        run: |
          expected="v$(cat .node-version)"
          actual="$(node --version)"
          if [ "$expected" != "$actual" ]; then
            echo "Node version mismatch: expected $expected, got $actual"
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run bundle

      - name: Check dist/ is fresh
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/ is out of date. Run 'npm run bundle' and commit the result."
            git diff dist/ | head -50
            exit 1
          fi

      - run: npm run size
      - run: npm run smoke

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run actionlint
        # Pin to a specific actionlint release tag rather than piping the
        # bootstrap script from `main` — supply-chain hygiene.
        # No glob arg: docker:// runs argv-style with no shell, so `*.yml`
        # would not expand. actionlint scans .github/workflows/ by default.
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
