name: "Railway Image Update"
description: "Update Docker image source and redeploy services on Railway via GraphQL API"
author: "mediazard"

branding:
  icon: "package"
  color: "purple"

inputs:
  api-token:
    description: "Railway API token (account, workspace, or project token)"
    required: true
  token-type:
    description: "Token type: 'bearer' for account/workspace tokens (default), 'project' for project-scoped tokens"
    required: false
    default: "bearer"
  environment-id:
    description: "Railway environment ID (UUID)"
    required: true
  image:
    description: "Full Docker image URI with tag or digest (e.g. ghcr.io/org/app:sha-abc123)"
    required: true
  services:
    description: "Multiline label:service_id pairs. Labels are for logging only. All services receive the same image."
    required: true
  first-service:
    description: "Label of the service to redeploy before all others. Remaining services deploy after wait."
    required: false
    default: ""
  wait-seconds:
    description: "Seconds to wait after first-service redeploys before deploying the rest"
    required: false
    default: "30"
  registry-username:
    description: "Registry username for private image pull authentication"
    required: false
    default: ""
  registry-password:
    description: "Registry password or token for private image pull authentication"
    required: false
    default: ""
  resolve-to-digest:
    description: "Resolve the image tag to a content-addressed digest before passing to Railway. Prevents mutable-tag races. Set to 'false' only if you manage digest pinning yourself."
    required: false
    default: "true"
  allow-mutable-tag:
    description: "When resolve-to-digest is 'false', allow deploying a mutable tag (latest, main, master, develop, stable, or no tag). Defaults to 'false' to fail fast on unsafe refs."
    required: false
    default: "false"

outputs:
  deployed-services:
    description: "Comma-separated list of service labels that were successfully deployed (always written, even on partial failure)"
  failed-services:
    description: "Comma-separated list of service labels that were not deployed (empty on full success; populated on partial or full failure)"
  image-tag:
    description: "The resolved image reference that was deployed. When resolve-to-digest is true (default), this is a digest-pinned ref."
  deployment-ids:
    description: "Newline-separated label=deployment-id pairs for each service deployed."

runs:
  using: "node20"
  main: "dist/index.js"
  post: "dist/index.js"
  post-if: "always()"
